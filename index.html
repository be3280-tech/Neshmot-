<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>נשמות — אפליקציית שידוכים</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C; --navy: #1A2744; --cream: #FAF7F0; --white: #ffffff; --border: #e0d8c0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--cream); color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* UI Elements */
    .top-bar { background: var(--navy); color: white; padding: 15px; text-align: center; flex-shrink: 0; position: relative; }
    .logo { font-family: 'Frank Ruhl Libre', serif; font-size: 24px; }
    
    .scroll-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px; }
    .section { display: none; }
    .section.active { display: block; }

    /* Photo AI Section */
    .photo-box { border: 2px dashed var(--gold); border-radius: 20px; padding: 20px; text-align: center; background: white; margin-bottom: 20px; cursor: pointer; }
    .preview-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); margin-bottom: 10px; }
    .ai-badge { background: var(--gold); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; display: inline-block; margin-top: 10px; font-weight: bold; }

    /* Profile Cards */
    .profile-card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); }
    .profile-info { padding: 15px; }
    .details-row { font-size: 13px; color: #666; margin: 5px 0; }
    .actions { display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #f0f0f0; }
    .btn-action { border: none; background: none; font-size: 28px; cursor: pointer; transition: transform 0.2s; }
    .btn-action:active { transform: scale(1.3); }

    /* Forms */
    .input-field { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; }
    .msg-counter { background: var(--navy); color: white; padding: 8px; border-radius: 10px; text-align: center; font-size: 13px; margin-bottom: 15px; }

    /* Match Animation */
    .match-overlay { position: fixed; inset: 0; background: rgba(26,39,68,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; text-align: center; animation: fadeIn 0.3s; }
    .match-overlay.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Nav */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
    .bottom-nav button { flex: 1; padding: 15px; border: none; background: none; font-size: 12px; color: #888; cursor: pointer; }
    .bottom-nav button.active { color: var(--gold); font-weight: bold; }

    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 10px 20px; border-radius: 30px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 2000; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="match-overlay" id="match-anim">
  <h1 style="font-size: 40px; margin-bottom: 10px;">זה מאץ'! 💖</h1>
  <p id="match-text">נמצאה התאמה רוחנית</p>
  <button onclick="closeMatch()" style="margin-top:30px; padding:12px 40px; border-radius:30px; border:none; background:var(--gold); color:white; font-weight:bold;">המשך לצ'אט</button>
</div>

<div class="top-bar"><div class="logo">נשמות</div></div>

<div class="scroll-area">
  <div id="tab-home" class="section active">
    <div class="msg-counter">הודעות חינם שנותרו: <span id="msg-left">10</span></div>
    <div id="feed-container"></div>
  </div>

  <div id="tab-likes" class="section">
    <h2 style="margin-bottom:20px">מי עשה לך לייק?</h2>
    <div id="likes-container"></div>
  </div>

  <div id="tab-profile" class="section">
    <h2>הפרופיל שלי</h2>
    
    <div class="photo-box" onclick="document.getElementById('ai-upload').click()">
      <input type="file" id="ai-upload" hidden accept="image/*" onchange="runAIAnalysis(event)">
      <img id="my-img" class="preview-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='8' r='4' fill='%23ccc'/%3E%3Cpath fill='%23ccc' d='M12 14c-6 0-8 4-8 4v2h16v-2s-2-4-8-4z'/%3E%3C/svg%3E">
      <div id="ai-status">לחץ לניתוח פנים AI</div>
      <div id="ai-result" class="ai-badge" style="display:none">דירוג AI: <span id="score">0</span>/10</div>
    </div>

    <input type="text" id="in-name" class="input-field" placeholder="שם מלא" oninput="updateData()">
    <input type="text" id="in-city" class="input-field" placeholder="עיר" oninput="updateData()">
    <input type="number" id="in-kids" class="input-field" placeholder="מספר ילדים" oninput="updateData()">
    <textarea id="in-bio" class="input-field" placeholder="ספר/י על עצמך..." style="height:100px" oninput="updateData()"></textarea>
    
    <div style="background:var(--gold); color:white; padding:15px; border-radius:15px; text-align:center; margin-top:10px;">
        💎 מנוי פרימיום פעיל: לא
        <p style="font-size:11px; margin-top:5px">שדרג כדי לראות מי עשה לך לייק ללא הגבלה</p>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button onclick="showTab('home')" id="n-home" class="active">🏠 פיד</button>
  <button onclick="showTab('likes')" id="n-likes">❤️ לייקים</button>
  <button onclick="showTab('profile')" id="n-profile">👤 פרופיל</button>
</nav>

<div id="toast" class="toast"></div>

<script>
// מאגר נתונים
const DB = [
  { id: 101, name: "מיכל", age: 24, city: "ירושלים", kids: 0, bio: "אוהבת שבתות משפחתיות וטיולים", emoji: "👸", score: 8 },
  { id: 102, name: "אפרת", age: 27, city: "צפת", kids: 0, bio: "אמנית בנשמה, מחפשת בן תורה", emoji: "🎨", score: 7 },
  { id: 103, name: "יעל", age: 31, city: "פתח תקווה", kids: 2, bio: "אחות במקצועי, אופטימית תמיד", emoji: "👩‍⚕️", score: 9 }
];

let state = JSON.parse(localStorage.getItem('soul_data_v3')) || {
  name: '', city: '', kids: '', bio: '', photo: '', score: 0, msgs: 0, likedBy: [102]
};

// שמירה ועדכון
function updateData() {
  state.name = document.getElementById('in-name').value;
  state.city = document.getElementById('in-city').value;
  state.kids = document.getElementById('in-kids').value;
  state.bio = document.getElementById('in-bio').value;
  localStorage.setItem('soul_data_v3', JSON.stringify(state));
}

// ניתוח AI
function runAIAnalysis(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (ev) => {
    state.photo = ev.target.result;
    document.getElementById('my-img').src = state.photo;
    showToast("ה-AI מנתח תווי פנים...");
    
    setTimeout(() => {
      state.score = Math.floor(Math.random() * 3) + 7; // ציון 7-10
      document.getElementById('score').innerText = state.score;
      document.getElementById('ai-result').style.display = 'inline-block';
      document.getElementById('ai-status').innerText = "ניתוח הושלם!";
      updateData();
    }, 2000);
  };
  reader.readAsDataURL(file);
}

// ניווט
function showTab(t) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('n-' + t).classList.add('active');
}

// הודעות וסינון
function handleMessage(name) {
  if (state.msgs >= 10) {
    alert("הגעת למכסה של 10 הודעות חינם. יש לרכוש מנוי להמשך.");
    return;
  }

  let text = prompt(`שלח הודעה ל${name}:`);
  if (!text) return;

  // חסימת טלפון עם כוכביות
  const cleanText = text.replace(/\d{8,}/g, '**********');
  if (cleanText !== text) showToast("מספרי טלפון צונזרו");

  state.msgs++;
  document.getElementById('msg-left').innerText = 10 - state.msgs;
  updateData();
  showToast("הודעה נשלחה בהצלחה!");
}

// רינדור הפיד
function renderFeed() {
  const container = document.getElementById('feed-container');
  container.innerHTML = DB.map(p => `
    <div class="profile-card">
      <div style="height:180px; background:#f9f4e8; display:flex; align-items:center; justify-content:center; font-size:70px">${p.emoji}</div>
      <div class="profile-info">
        <h3>${p.name}, ${p.age}</h3>
        <div class="details-row">📍 ${p.city} | 👶 ילדים: ${p.kids}</div>
        <p style="font-size:14px; color:#555">${p.bio}</p>
      </div>
      <div class="actions">
        <button class="btn-action" onclick="showToast('הפרופיל דולג')">👎</button>
        <button class="btn-action" onclick="showMatchAnim('${p.name}')">❤️</button>
        <button class="btn-action" onclick="handleMessage('${p.name}')">💬</button>
      </div>
    </div>
  `).join('');
}

function showMatchAnim(name) {
  document.getElementById('match-text').innerText = `בינך לבין ${name} יש התאמה!`;
  document.getElementById('match-anim').classList.add('active');
}

function closeMatch() {
  document.getElementById('match-anim').classList.remove('active');
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.onload = () => {
  // טעינת נתונים שמורים
  document.getElementById('in-name').value = state.name || '';
  document.getElementById('in-city').value = state.city || '';
  document.getElementById('in-kids').value = state.kids || '';
  document.getElementById('in-bio').value = state.bio || '';
  document.getElementById('msg-left').innerText = 10 - state.msgs;
  if(state.photo) {
      document.getElementById('my-img').src = state.photo;
      document.getElementById('score').innerText = state.score;
      document.getElementById('ai-result').style.display = 'inline-block';
  }
  renderFeed();
};
</script>
</body>
</html>
