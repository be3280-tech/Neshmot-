<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>נשמות — חיבורים מהלב</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C; --navy: #1A2744; --cream: #FAF7F0;
      --text: #2C1810; --muted: #6B5B4E; --border: rgba(201,168,76,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: var(--cream); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* HEADER & SIDEBAR */
    .top-bar { background: var(--navy); color: #fff; padding: 14px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
    .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #fff; transition: 0.3s; z-index: 2000; padding: 20px; box-shadow: -2px 0 10px rgba(0,0,0,0.1); }
    .sidebar.open { right: 0; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
    .sidebar-overlay.show { display: block; }
    .nav-item { padding: 15px 0; border-bottom: 0.5px solid #eee; cursor: pointer; color: var(--navy); font-weight: 500; display: flex; justify-content: space-between; }

    /* SEARCH BAR */
    .search-section { background: #fff; padding: 12px; border-bottom: 1px solid var(--border); }
    .search-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
    .search-grid select, .search-grid input { padding: 6px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-family: 'Heebo'; }

    /* SCROLL AREA */
    .scroll-area { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }
    .section { display: none; }
    .section.active { display: block; }

    /* PROFILE CARDS (HOME) */
    .profile-card { background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 16px; position: relative; }
    .profile-img-placeholder { height: 200px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 50px; }
    .profile-info { padding: 15px; }
    .profile-info h3 { font-family: 'Frank Ruhl Libre'; color: var(--navy); }
    .block-btn { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.3); color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }

    /* FORMS */
    .card { background: #fff; padding: 16px; border-radius: 16px; border: 0.5px solid var(--border); margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Heebo'; }

    .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
    .bottom-nav button { flex: 1; border: none; background: transparent; padding: 15px; font-size: 12px; color: var(--muted); }
    .bottom-nav button.active { color: var(--navy); font-weight: bold; border-top: 2px solid var(--gold); }

    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: 0.3s; z-index: 3000; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
  <div class="sidebar" id="sidebar">
    <h2 style="font-family: 'Frank Ruhl Libre'; color: var(--navy);">הגדרות שירות</h2>
    <div class="nav-item" onclick="showTab('profile'); toggleMenu();">⚙️ עריכת פרופיל</div>
    <div class="nav-item" onclick="showTab('blocked'); toggleMenu();">🚫 רשימת חסומים <span id="blocked-count">0</span></div>
    <div class="nav-item" onclick="showToast('פרטיות: המידע שלך מוצפן')">🔒 פרטיות ומדיניות</div>
    <div class="nav-item" style="color: red; margin-top: 20px;" onclick="location.reload()">🚪 התנתקות</div>
  </div>

  <header class="top-bar">
    <div onclick="toggleMenu()" style="cursor:pointer; font-size: 20px;">☰</div>
    <div class="logo">נשמ<span>ה</span>ות</div>
    <div style="width:20px;"></div>
  </header>

  <div id="tab-home" class="section active">
    <div class="search-section">
      <input type="text" placeholder="חפש לפי שם..." style="width:100%; padding:8px; border-radius:8px; border:1px solid var(--border);">
      <div class="search-grid">
        <select id="search-age"><option>גיל</option><option>18-25</option><option>26-35</option><option>36+</option></select>
        <input type="text" id="search-city" placeholder="עיר">
        <select id="search-status"><option>מצב משפחתי</option><option>רווק/ה</option><option>גרוש/ה</option><option>אלמן/ה</option></select>
      </div>
    </div>
    <div class="scroll-area" id="feed">
      </div>
  </div>

  <div id="tab-profile" class="section">
    <div class="scroll-area">
      <h2 style="font-family: 'Frank Ruhl Libre'; margin-bottom: 15px;">הפרופיל האישי שלי</h2>
      <div class="card">
        <div class="form-group"><label>שם מלא</label><input type="text" placeholder="יוסי כהן"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          <div class="form-group"><label>גיל</label><input type="number" value="25"></div>
          <div class="form-group"><label>מגדר</label><select><option>זכר</option><option>נקבה</option></select></div>
        </div>
        <div class="form-group"><label>עיר מגורים</label><input type="text" placeholder="ירושלים"></div>
        <div class="form-group">
          <label>מצב משפחתי</label>
          <select><option>רווק/ה</option><option>גרוש/ה</option><option>אלמן/ה</option></select>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          <div class="form-group"><label>מזל</label><select><option>טלה</option><option>שור</option><option>תאומים</option><option>סרטן</option><option>אריה</option><option>בתולה</option><option>מאזניים</option><option>עקרב</option><option>קשת</option><option>גדי</option><option>דלי</option><option>דגים</option></select></div>
          <div class="form-group"><label>רמה דתית</label><select><option>חרדי</option><option>דתי לאומי</option><option>מסורתי</option><option>חוזר בתשובה</option></select></div>
        </div>
        <div class="form-group"><label>קצת על עצמי</label><textarea rows="3" placeholder="ספר/י על עצמך ומה את/ה מחפש/ת..."></textarea></div>
        <button class="btn-primary" style="background:var(--gold); border:none; width:100%; padding:12px; border-radius:10px; color:white; font-weight:bold;" onclick="showToast('הפרופיל עודכן בהצלחה!')">שמור שינויים</button>
      </div>
    </div>
  </div>

  <div id="tab-blocked" class="section">
    <div class="scroll-area">
      <h2 style="font-family: 'Frank Ruhl Libre'; margin-bottom: 15px;">פרופילים שחסמת</h2>
      <div id="blocked-list-container">
        <p style="text-align:center; color:var(--muted); margin-top:30px;">רשימת החסומים שלך ריקה</p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button id="nav-home" class="active" onclick="showTab('home')">🏠 בית</button>
    <button id="nav-profile" onclick="showTab('profile')">👤 פרופיל</button>
    <button onclick="showToast('הודעות וצפיות בפרימיום בלבד')">💬 הודעות</button>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    const MOCK_PROFILES = [
      { id: 1, name: "רחל א.", age: 24, city: "בני ברק", status: "רווקה", religion: "חרדי", sign: "בתולה", emoji: "👩" },
      { id: 2, name: "משה ל.", age: 28, city: "ירושלים", status: "רווק", religion: "דתי לאומי", sign: "אריה", emoji: "👨" },
      { id: 3, name: "שירה ג.", age: 22, city: "פתח תקווה", status: "רווקה", religion: "מסורתית", sign: "סרטן", emoji: "👩‍🦰" }
    ];

    let blockedIds = new Set();

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    function showTab(t) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-'+t).classList.add('active');
      if(document.getElementById('nav-'+t)) document.getElementById('nav-'+t).classList.add('active');
    }

    function blockProfile(id, name) {
      blockedIds.add(id);
      showToast(name + " נחסם/ה ולא יופיעו יותר");
      renderFeed();
      updateBlockedList();
    }

    function unblockProfile(id) {
      blockedIds.delete(id);
      renderFeed();
      updateBlockedList();
    }

    function renderFeed() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      MOCK_PROFILES.filter(p => !blockedIds.has(p.id)).forEach(p => {
        feed.innerHTML += `
          <div class="profile-card">
            <button class="block-btn" onclick="blockProfile(${p.id}, '${p.name}')">🚫 חסום</button>
            <div class="profile-img-placeholder">${p.emoji}</div>
            <div class="profile-info">
              <h3>${p.name}, ${p.age}</h3>
              <p style="font-size:12px; color:var(--muted);">${p.city} • ${p.status} • ${p.religion}</p>
              <p style="font-size:11px; margin-top:5px;">מזל: ${p.sign}</p>
              <button style="width:100%; margin-top:10px; padding:8px; border:1px solid var(--gold); background:none; border-radius:8px; color:var(--gold); font-weight:bold; cursor:pointer;">צפה בפרופיל</button>
            </div>
          </div>
        `;
      });
    }

    function updateBlockedList() {
      const container = document.getElementById('blocked-list-container');
      const countLabel = document.getElementById('blocked-count');
      countLabel.innerText = blockedIds.size;
      
      if(blockedIds.size === 0) {
        container.innerHTML = '<p style="text-align:center; color:var(--muted); margin-top:30px;">רשימת החסומים שלך ריקה</p>';
        return;
      }
      
      container.innerHTML = '';
      MOCK_PROFILES.filter(p => blockedIds.has(p.id)).forEach(p => {
        container.innerHTML += `
          <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <span>${p.name} (${p.city})</span>
            <button onclick="unblockProfile(${p.id})" style="color:var(--gold); border:none; background:none; cursor:pointer; font-weight:bold;">ביטול חסימה</button>
          </div>
        `;
      });
    }

    function showToast(m) {
      const t = document.getElementById('toast');
      t.innerText = m; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener('DOMContentLoaded', renderFeed);
  </script>
</body>
</html>
