<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>נשמות — פרימיום</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C; --gold-dark: #A68A3D; --navy: #1A2744; 
      --cream: #FAF7F0; --white: #ffffff; --light-gray: #F4F4F4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--cream); color: var(--navy); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* Header */
    .app-header { 
      background: var(--white); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 15px rgba(0,0,0,0.04); z-index: 100;
    }
    .menu-trigger { font-size: 24px; cursor: pointer; }
    .app-logo { font-family: 'Frank Ruhl Libre', serif; font-size: 24px; font-weight: 900; color: var(--gold); letter-spacing: -1px; }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed; bottom: 0; width: 100%; background: var(--white);
      display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(0,0,0,0.05); z-index: 100;
    }
    .nav-item { border: none; background: none; color: #aaa; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; transition: 0.3s; }
    .nav-item.active { color: var(--gold); }
    .nav-item span { font-size: 11px; font-weight: 500; }
    .nav-icon { font-size: 20px; }

    /* Content Area */
    .main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; scroll-behavior: smooth; }
    .page { display: none; animation: slideIn 0.3s ease-out; }
    .page.active { display: block; }

    /* Feed Cards */
    .user-card { 
      background: var(--white); border-radius: 30px; overflow: hidden; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; border: 1px solid rgba(201,168,76,0.1);
    }
    .card-img-container { height: 350px; background: #e9e2d5; position: relative; display: flex; align-items: center; justify-content: center; font-size: 120px; }
    .compat-badge { position: absolute; top: 20px; left: 20px; background: rgba(26,39,68,0.85); color: white; padding: 6px 14px; border-radius: 15px; font-size: 13px; backdrop-filter: blur(5px); }
    .card-info { padding: 25px; }
    .card-info h2 { font-family: 'Frank Ruhl Libre', serif; font-size: 26px; margin-bottom: 8px; }
    .user-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
    .chip { background: var(--light-gray); padding: 5px 12px; border-radius: 10px; font-size: 13px; color: var(--navy); font-weight: 500; }
    .user-bio { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
    
    .card-actions { display: flex; gap: 12px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
    .btn-skip { background: #F0F0F0; color: #888; }
    .btn-like { background: var(--gold); color: white; box-shadow: 0 4px 15px rgba(201,168,76,0.3); }

    /* Profile Form */
    .form-section { background: white; border-radius: 25px; padding: 25px; margin-bottom: 20px; border: 1px solid #eee; }
    .profile-photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .photo-slot { aspect-ratio: 1/1; background: #f9f9f9; border: 2px dashed #ddd; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #ccc; cursor: pointer; overflow: hidden; }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 13px; color: var(--gold-dark); margin-bottom: 5px; font-weight: bold; }
    .input-group input, .input-group select, .input-group textarea { 
      width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; font-size: 15px; outline: none; transition: 0.3s;
    }
    .input-group input:focus { border-color: var(--gold); }

    /* Side Menu */
    .drawer { position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; background: var(--navy); z-index: 1000; transition: 0.3s; padding: 50px 30px; color: white; }
    .drawer.open { left: 0; }
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
    .drawer-overlay.active { display: block; }
    .drawer ul { list-style: none; margin-top: 40px; }
    .drawer li { padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 18px; cursor: pointer; }

    @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <h1 class="app-logo" style="color:white">נשמות</h1>
  <ul>
    <li onclick="navigateTo('profile')">👤 הפרופיל שלי</li>
    <li onclick="navigateTo('likes')">❤️ לייקים שקיבלתי</li>
    <li onclick="navigateTo('home')">🔍 חיפוש התאמות</li>
    <li>⚙️ הגדרות חשבון</li>
    <li style="color: #ff6b6b">🔌 התנתקות</li>
  </ul>
</div>

<header class="app-header">
  <div class="menu-trigger" onclick="toggleDrawer()">☰</div>
  <div class="app-logo">נשמות</div>
  <div style="width: 24px"></div>
</header>

<main class="main-content">
  
  <div id="page-home" class="page active">
    <div id="feed-container"></div>
  </div>

  <div id="page-near" class="page">
    <h2 style="margin-bottom:20px; font-family:'Frank Ruhl Libre'">קרובים אלייך</h2>
    <div id="near-container"></div>
  </div>

  <div id="page-likes" class="page">
    <h2 style="margin-bottom:20px; font-family:'Frank Ruhl Libre'">לייקים שקיבלת</h2>
    <div style="text-align:center; padding:50px 20px; color:#888;">
      <div style="font-size:50px; margin-bottom:10px;">💝</div>
      <p>שדרגי לפרימיום כדי לראות מי מחכה לך!</p>
    </div>
  </div>

  <div id="page-profile" class="page">
    <h2 style="margin-bottom:20px; font-family:'Frank Ruhl Libre'">הפרופיל שלי</h2>
    
    <div class="form-section">
      <label style="font-weight:bold; display:block; margin-bottom:10px;">התמונות שלי (עד 3)</label>
      <div class="profile-photo-grid">
        <div class="photo-slot" id="slot-1" onclick="uploadImg(1)">+</div>
        <div class="photo-slot" id="slot-2" onclick="uploadImg(2)">+</div>
        <div class="photo-slot" id="slot-3" onclick="uploadImg(3)">+</div>
      </div>

      <div class="input-group">
        <label>שם מלא</label>
        <input type="text" id="p-name" placeholder="הכנס/י שם...">
      </div>
      <div class="input-group">
        <label>עיר מגורים</label>
        <input type="text" id="p-city" placeholder="איפה את/ה גר/ה?">
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="input-group">
          <label>רמה דתית</label>
          <select id="p-rel">
            <option>דתי לאומי</option>
            <option>חרדי</option>
            <option>מסורתי</option>
            <option>חב"ד</option>
          </select>
        </div>
        <div class="input-group">
          <label>מזל</label>
          <select id="p-zodiac">
            <option>טלה</option><option>שור</option><option>תאומים</option><option>סרטן</option>
            <option>אריה</option><option>בתולה</option><option>מאזניים</option><option>עקרב</option>
            <option>קשת</option><option>גדי</option><option>דלי</option><option>דגים</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <label>השכלה</label>
        <input type="text" id="p-edu" placeholder="תואר / ישיבה / מדרשה">
      </div>
      <div class="input-group">
        <label>תחביבים (הפרד בפסיק)</label>
        <input type="text" id="p-hobbies" placeholder="בישול, נגינה, טיולים...">
      </div>
      <div class="input-group">
        <label>תיאור קצר</label>
        <textarea id="p-bio" placeholder="קצת עלייך ומה את/ה מחפש/ת..."></textarea>
      </div>
      <button class="btn btn-like" style="width:100%" onclick="saveProfile()">שמור פרופיל ✅</button>
    </div>
  </div>

</main>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="navigateTo('home')" id="btn-home">
    <div class="nav-icon">🏠</div><span>בית</span>
  </button>
  <button class="nav-item" onclick="navigateTo('near')" id="btn-near">
    <div class="nav-icon">📍</div><span>קרובים</span>
  </button>
  <button class="nav-item" onclick="navigateTo('likes')" id="btn-likes">
    <div class="nav-icon">❤️</div><span>לייקים</span>
  </button>
  <button class="nav-item" onclick="navigateTo('profile')" id="btn-profile">
    <div class="nav-icon">👤</div><span>פרופיל</span>
  </button>
</nav>

<script>
  // דאטה סימולטיבי
  const MOCK_USERS = [
    { name: "מיכל", age: 24, city: "ירושלים", rel: "דתי לאומי", edu: "תואר ראשון בחינוך", hobbies: ["נגינה", "טיולים"], bio: "אוהבת שבתות רגועות ומחפשת מישהו עם ראש פתוח ולב רחב.", score: 94, emoji: "👸" },
    { name: "רחל", age: 26, city: "צפת", rel: "חרדי", edu: "סמינר הישן", hobbies: ["ציור", "כתיבה"], bio: "מחפשת בן תורה רציני, אוהבת אומנות ועומק.", score: 88, emoji: "🎨" },
    { name: "דניאל", age: 29, city: "רעננה", rel: "מסורתי", edu: "הנדסת תוכנה", hobbies: ["כושר", "ים"], bio: "בחור שמח, שומר שבת וכשרות, מחפש את האחת.", score: 91, emoji: "👨‍💻" }
  ];

  function toggleDrawer() {
    document.getElementById('drawer').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('active');
  }

  function navigateTo(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById('page-' + pageId).classList.add('active');
    document.getElementById('btn-' + pageId).classList.add('active');
    if(pageId === 'drawer') toggleDrawer();
  }

  function renderFeed() {
    const container = document.getElementById('feed-container');
    container.innerHTML = MOCK_USERS.map(u => `
      <div class="user-card">
        <div class="card-img-container">
          ${u.emoji}
          <div class="compat-badge">✨ ${u.score}% התאמה</div>
        </div>
        <div class="card-info">
          <h2>${u.name}, ${u.age}</h2>
          <div class="user-meta">
            <span class="chip">📍 ${u.city}</span>
            <span class="chip">🕍 ${u.rel}</span>
            <span class="chip">🎓 ${u.edu}</span>
          </div>
          <p class="user-bio">${u.bio}</p>
          <div style="margin-bottom:15px">
            <small style="color:var(--gold-dark); font-weight:bold">תחביבים: </small>
            ${u.hobbies.map(h => `<span style="font-size:13px; color:#777">#${h} </span>`).join('')}
          </div>
          <div class="card-actions">
            <button class="btn btn-skip" onclick="this.closest('.user-card').style.display='none'">דלג/י</button>
            <button class="btn btn-like" onclick="alert('שלחת לייק ל${u.name}! ❤️')">שלח/י לייק</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // סימולציית העלאת תמונות
  function uploadImg(slot) {
    const url = prompt("הדבק לינק לתמונה (או שה-AI ינתח תמונת דמו):");
    if(url) {
      document.getElementById('slot-'+slot).innerHTML = `<img src="${url}">`;
      alert("ה-AI מנתח את התמונה... הציון שלך יעודכן!");
    }
  }

  function saveProfile() {
    const data = {
      name: document.getElementById('p-name').value,
      city: document.getElementById('p-city').value,
      rel: document.getElementById('p-rel').value,
      zodiac: document.getElementById('p-zodiac').value
    };
    localStorage.setItem('soulmate_profile', JSON.stringify(data));
    alert("הפרופיל נשמר בהצלחה! 🌟");
    navigateTo('home');
  }

  window.onload = () => {
    renderFeed();
    // טעינת מידע שמור
    const saved = JSON.parse(localStorage.getItem('soulmate_profile'));
    if(saved) {
      document.getElementById('p-name').value = saved.name || '';
      document.getElementById('p-city').value = saved.city || '';
    }
  };
</script>

</body>
</html>
