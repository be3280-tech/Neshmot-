<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>נשמות — אפליקציית שידוכים</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C; --navy: #1A2744; --cream: #FAF7F0; --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; }
    body { background: var(--cream); color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* UI Elements */
    .top-bar { background: var(--navy); color: white; padding: 15px; text-align: center; flex-shrink: 0; }
    .logo { font-family: 'Frank Ruhl Libre', serif; font-size: 24px; }
    
    .scroll-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px; }
    .section { display: none; }
    .section.active { display: block; }

    /* כרטיסיות פרופיל */
    .profile-card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
    .profile-info { padding: 15px; }
    .profile-info h3 { font-size: 20px; margin-bottom: 5px; }
    .details-row { font-size: 13px; color: #666; margin-bottom: 10px; }
    .actions { display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #f0f0f0; }
    .btn-action { border: none; background: none; font-size: 24px; cursor: pointer; transition: transform 0.2s; }
    .btn-action:active { transform: scale(1.3); }

    /* אפקט לייק/מאץ' */
    @keyframes matchPop {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); }
    }
    .match-overlay { position: fixed; inset: 0; background: rgba(26,39,68,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; text-align: center; }
    .match-overlay.active { display: flex; animation: matchPop 0.5s ease-out; }

    /* צ'אט */
    .chat-item { display: flex; align-items: center; gap: 12px; padding: 15px; background: white; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
    .avatar-sm { width: 50px; height: 50px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }

    /* טפסים */
    .input-field { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
    .premium-badge { background: linear-gradient(45deg, var(--gold), #f1e0b0); color: var(--navy); padding: 15px; border-radius: 12px; font-weight: bold; text-align: center; margin-top: 20px; }

    /* ניווט */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding-bottom: 15px; }
    .bottom-nav button { flex: 1; padding: 15px; border: none; background: none; font-size: 12px; color: #888; }
    .bottom-nav button.active { color: var(--gold); font-weight: bold; }
  </style>
</head>
<body>

<div class="match-overlay" id="match-anim">
  <h1 style="font-family:'Frank Ruhl Libre'; font-size: 48px;">זה מאץ'! 💖</h1>
  <p>נמצאה נשמה תואמת</p>
  <button onclick="closeMatch()" style="margin-top:20px; padding:10px 30px; border-radius:20px; border:none;">איזה כיף!</button>
</div>

<div class="top-bar"><div class="logo">נשמות</div></div>

<div class="scroll-area">
  <div id="tab-home" class="section active">
    <div id="feed-container"></div>
  </div>

  <div id="tab-messages" class="section">
    <h2 style="margin-bottom:15px">השיחות שלי</h2>
    <div id="chats-container"></div>
  </div>

  <div id="tab-likes" class="section">
    <h2 style="margin-bottom:15px">מי עשה לי לייק?</h2>
    <div id="likes-received-container"></div>
  </div>

  <div id="tab-profile" class="section">
    <h2>הפרופיל שלי</h2>
    <div style="background:white; padding:15px; border-radius:15px; margin-top:10px;">
      <input type="text" id="p-name" class="input-field" placeholder="שם מלא" oninput="save()">
      <input type="text" id="p-city" class="input-field" placeholder="עיר מגורים" oninput="save()">
      <input type="number" id="p-kids" class="input-field" placeholder="מספר ילדים" oninput="save()">
      <textarea id="p-bio" class="input-field" placeholder="קצת עלי..." oninput="save()"></textarea>
      
      <div class="premium-badge">
        💎 מנוי פרימיום: ללא הגבלת הודעות
        <button onclick="alert('עובר לתשלום...')" style="display:block; width:100%; margin-top:10px; padding:8px; background:var(--navy); color:white; border:none; border-radius:5px;">רכוש עכשיו</button>
      </div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button onclick="showTab('home')" id="n-home" class="active">🏠 בית</button>
  <button onclick="showTab('likes')" id="n-likes">❤️ לייקים</button>
  <button onclick="showTab('messages')" id="n-messages">💬 הודעות</button>
  <button onclick="showTab('profile')" id="n-profile">👤 אני</button>
</nav>

<script>
// מאגר משתמשים דמיוני
const USERS = [
  { id: 1, name: "מיכל", age: 24, city: "ירושלים", kids: 0, bio: "אוהבת טיולים וספרים", emoji: "🌸" },
  { id: 2, name: "דניאל", age: 29, city: "תל אביב", kids: 0, bio: "הייטקיסט שומר מסורת", emoji: "👨‍💻" },
  { id: 3, name: "נועה", age: 27, city: "חיפה", kids: 2, bio: "אמא במשרה מלאה, מחפשת פרק ב'", emoji: "👩‍👧‍👦" }
];

let myData = JSON.parse(localStorage.getItem('user_v2')) || { name: '', city: '', kids: '', bio: '', likesReceived: [1], messages: [] };

function save() {
  myData.name = document.getElementById('p-name').value;
  myData.city = document.getElementById('p-city').value;
  myData.kids = document.getElementById('p-kids').value;
  myData.bio = document.getElementById('p-bio').value;
  localStorage.setItem('user_v2', JSON.stringify(myData));
}

function showTab(t) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('n-' + t).classList.add('active');
}

// חסימת טלפונים והחלפה בכוכביות
function maskPhoneNumbers(text) {
  return text.replace(/\d{8,}/g, '**********');
}

function renderFeed() {
  const container = document.getElementById('feed-container');
  container.innerHTML = USERS.map(u => `
    <div class="profile-card">
      <div style="height:200px; background:#eee; display:flex; align-items:center; justify-content:center; font-size:80px">${u.emoji}</div>
      <div class="profile-info">
        <h3>${u.name}, ${u.age}</h3>
        <div class="details-row">📍 ${u.city} | 👶 ילדים: ${u.kids}</div>
        <p style="font-size:14px">${u.bio}</p>
      </div>
      <div class="actions">
        <button class="btn-action" onclick="alert('הפרופיל הוסתר')">👎</button>
        <button class="btn-action" onclick="triggerMatch(${u.id})">❤️</button>
      </div>
    </div>
  `).join('');
}

function triggerMatch(id) {
  document.getElementById('match-anim').classList.add('active');
}

function closeMatch() {
  document.getElementById('match-anim').classList.remove('active');
  showTab('messages');
}

function renderLikes() {
  const container = document.getElementById('likes-received-container');
  container.innerHTML = myData.likesReceived.map(id => {
    const u = USERS.find(x => x.id === id);
    return `
      <div class="chat-item" onclick="showTab('home')">
        <div class="avatar-sm">${u.emoji}</div>
        <div>
          <div style="font-weight:bold">${u.name} שלח/ה לך לייק!</div>
          <div style="font-size:12px; color:var(--gold)">לחץ לצפייה בפרופיל</div>
        </div>
      </div>`;
  }).join('');
}

// פונקציית הודעות עם סינון כוכביות
function sendMessage(targetName) {
  let rawMsg = prompt(`שלח הודעה ל${targetName}:`);
  if (!rawMsg) return;
  
  let safeMsg = maskPhoneNumbers(rawMsg);
  if (safeMsg !== rawMsg) {
    alert("שים לב: מספרי טלפון הוסתרו מטעמי בטיחות.");
  }
  
  alert(`הודעה נשלחה: ${safeMsg}`);
}

// אתחול
window.onload = () => {
  document.getElementById('p-name').value = myData.name;
  document.getElementById('p-city').value = myData.city;
  document.getElementById('p-kids').value = myData.kids;
  document.getElementById('p-bio').value = myData.bio;
  renderFeed();
  renderLikes();
};
</script>
</body>
</html>
